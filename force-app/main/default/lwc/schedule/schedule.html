<template>
    <div class="page">
        <div class="page-header">
            <div class="page-header-left">
                <h2 class="page-title">Schedule</h2>
                <span class="page-subtitle">Week of Apr 14 – 20, 2026</span>
            </div>
            <span class="current-date">{currentDate}</span>
        </div>

        <div class="schedule-wrap">
            <div class="schedule-grid" style={gridRowsStyle}>
                <!-- Time labels: spans the full grid height as a single column -->
                <div class="time-col">
                    <template for:each={timeSlots} for:item="slot">
                        <div key={slot.key} class="time-cell">
                            <span class="time-label">{slot.label}</span>
                        </div>
                    </template>
                </div>

                <!-- Events column hosts a nested CSS grid: rows = 30 min slots,
                     columns = lanes (computed in JS via --lane-count). -->
                <div class="events-col">
                    <!-- Hour gridlines (decorative). Each line aligns to a top-of-hour row. -->
                    <template for:each={timeSlots} for:item="slot">
                        <div key={slot.key} class="hour-line"></div>
                    </template>

                    <!-- Current-time bar. Positioned via grid row using --now-row. -->
                    <div class="now-bar" style={currentTimeStyle}>
                        <span class="now-dot"></span>
                    </div>

                    <!-- Event blocks — sized & placed entirely via CSS Grid. -->
                    <template for:each={formattedEvents} for:item="event">
                        <div key={event.key} class={event.blockClass} style={event.blockStyle}>
                            <div class="event-inner">
                                <div class="event-title">{event.title}</div>
                                <template lwc:if={event.instructor}>
                                    <div class="event-sub">{event.instructor}</div>
                                </template>
                                <div class="event-meta">{event.startTime} – {event.endTime}</div>
                                <template lwc:if={event.location}>
                                    <div class="event-loc">
                                        <c-icon name="room" size="12"></c-icon>
                                        {event.location}
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
