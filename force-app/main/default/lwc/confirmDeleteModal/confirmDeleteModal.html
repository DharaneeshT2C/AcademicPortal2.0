<template>
    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading"
        class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close"
                    onclick={handleCancel}>
                    <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 id="modal-heading" class="slds-modal__title slds-hyphenate">
                    Delete {recordName}
                </h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium slds-text-align_center">
                <p>Are you sure you want to delete this {objectLabel}?</p>
            </div>

            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" variant="neutral" onclick={handleCancel}
                    class="slds-m-right_x-small"></lightning-button>
                <lightning-button label="Delete" variant="brand" onclick={handleConfirm}></lightning-button>
            </footer>

        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
