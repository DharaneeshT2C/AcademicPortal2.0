<template>
    <div class="resume-library-page">

        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <button class="bc-link" onclick={handleBack}>Home</button>
            <span class="bc-sep">›</span>
            <button class="bc-link" onclick={handleBack}>Placements</button>
            <span class="bc-sep">›</span>
            <span class="bc-current">Resume Library</span>
        </div>

        <!-- Page Header -->
        <div class="lib-header">
            <h2 class="page-title">Resume Library</h2>
        </div>

        <!-- Search + Create Row -->
        <div class="lib-toolbar">
            <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Search resumes..." class="search-input" onchange={handleSearch} />
                <button class="mic-btn" title="Voice search" onclick={handleVoiceSearch}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
            </div>
            <button class="btn-create" onclick={handleCreateResume}>+ Create Resume</button>
        </div>

        <!-- Resume Cards Grid -->
        <template lwc:if={hasResumes}>
            <div class="resume-grid">
                <template for:each={filteredResumes} for:item="resume">
                    <div key={resume.id} class="resume-card">
                        <div class="resume-card-inner">
                            <div class="pdf-icon-block">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                                <span class="pdf-label">PDF</span>
                            </div>
                            <div class="resume-meta">
                                <div class="resume-filename">{resume.filename}</div>
                                <div class="resume-last-used">Last used on {resume.lastUsed}</div>
                            </div>
                            <button class="menu-dots-btn" title="Options" data-id={resume.id} onclick={handleResumeOptions}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <template lwc:else>
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <p class="empty-title">No resumes found</p>
                <p class="empty-sub">Create your first resume to get started.</p>
                <button class="btn-create" onclick={handleCreateResume}>Create Resume</button>
            </div>
        </template>
    </div>
</template>
