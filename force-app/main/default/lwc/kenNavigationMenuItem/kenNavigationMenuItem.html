<template>
    <div class={itemClass}>
        <div class="nav-item-main"
             onclick={handleClick}
             onmouseover={handleMouseEnter}
             onmouseout={handleMouseLeave}>
            <template if:true={hasIcon}>
                <template if:true={isUtilityIcon}>
                    <lightning-icon icon-name={iconName} size="small" class="nav-icon-utility"></lightning-icon>
                </template>
                <template if:false={isUtilityIcon}>
                    <div class="nav-icon nav-icon-mask" style={iconMaskStyle} role="img" aria-label={label}></div>
                </template>
            </template>
            <span class={textClass}>{label}</span>

            <template if:true={showDropdown}>
                <div class="toggle-icon-wrapper">
                    <lightning-button-icon
                        icon-name="utility:down"
                        variant="bare"
                        alternative-text="Toggle Dropdown"
                        class="toggle-icon">
                    </lightning-button-icon>
                </div>
            </template>
        </div>

        <template if:true={showTooltip}>
            <div class="nav-tooltip" style={tooltipStyle}>
                <span>{label}</span>
            </div>
        </template>

        <template if:true={isSubMenuVisible}>
            <ul class="sidenav-submenu">
                <template for:each={item.subMenu} for:item="subMenu">
                    <li key={subMenu.id} class="submenu-item">
                        <c-ken-sub-navigation-menu-item
                            item={subMenu}
                            is-selected={subMenu.isSelected}
                            class="full-width"
                            onsubmenuselect={handleSubMenuSelect}>
                        </c-ken-sub-navigation-menu-item>
                    </li>
                </template>
            </ul>
        </template>
    </div>
</template>
