<template>
    <div class="page">
        <div class="page-header">
            <div>
                <h2 class="page-title">Exam Enrollment</h2>
                <c-breadcrumb items={crumbs}></c-breadcrumb>
            </div>
            <div class="semester-pill">{currentSemesterLabel}</div>
        </div>

        <div class="card">
            <div class="card-header">
                <div>
                    <h3 class="section-title">Select Exams</h3>
                    <p class="section-subtitle">{selectedSummary}</p>
                </div>
                <button class="btn-primary" type="button" onclick={openConfirmModal} disabled={isProceedDisabled}>
                    Continue
                </button>
            </div>

            <template lwc:if={isLoading}>
                <c-skeleton-loader variant="table" rows="5"></c-skeleton-loader>
            </template>
            <template lwc:elseif={errorMessage}>
                <div class="state-message error">{errorMessage}</div>
            </template>
            <template lwc:elseif={hasRows}>
                <div class="table-wrap">
                    <table class="enroll-table">
                        <thead>
                            <tr>
                                <th class="select-col">
                                    <input type="checkbox" checked={isAllEligibleSelected} onchange={handleSelectAll} />
                                </th>
                                <th>Course Name</th>
                                <th>Course Code</th>
                                <th>Exam</th>
                                <th>Credits</th>
                                <th>Format</th>
                                <th>Type</th>
                                <th>Eligibility</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displayRows} for:item="row">
                                <tr key={row.id}>
                                    <td class="select-col">
                                        <input
                                            type="checkbox"
                                            checked={row.selected}
                                            disabled={row.isDisabled}
                                            data-id={row.id}
                                            onchange={handleRowToggle}
                                        />
                                    </td>
                                    <td>{row.courseName}</td>
                                    <td>{row.courseCode}</td>
                                    <td>{row.exam}</td>
                                    <td>{row.credits}</td>
                                    <td>{row.format}</td>
                                    <td>{row.type}</td>
                                    <td>
                                        <span class={row.eligibilityClass}>{row.eligibilityLabel}</span>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template lwc:else>
                <div class="state-message">{emptyMessage}</div>
            </template>
        </div>

        <template lwc:if={isConfirmModalOpen}>
            <section class="modal-backdrop" onclick={closeConfirmModal}>
                <div class="modal" onclick={stopModalClose}>
                    <h3>Confirm Enrollment</h3>
                    <p>{selectedSummary} for {currentSemesterLabel}</p>
                    <template lwc:if={errorMessage}>
                        <div class="error-banner">{errorMessage}</div>
                    </template>
                    <div class="modal-actions">
                        <button class="btn-secondary" type="button" onclick={closeConfirmModal}>Cancel</button>
                        <button class="btn-primary" type="button" onclick={handleContinue} disabled={isProceedDisabled}>
                            Confirm
                        </button>
                    </div>
                </div>
            </section>
        </template>
    </div>
</template>
