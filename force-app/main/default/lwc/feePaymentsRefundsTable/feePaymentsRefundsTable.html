<template>
    <section class="table-panel">
	        <div class="table-shell desktop-table">
	            <div class="table-head">
	                <span>Refund ID</span>
	                <button class="sort-button" type="button" onclick={handleInitiatedDateSort}>
	                    <span>Initiated Date</span>
	                    <img src={sortIcon} alt="Sort" class="sort-mark" />
	                </button>
	                <span>Currency</span>
	                <span>Amount</span>
	                <span>Refund Date</span>
	                <span>Transaction ID</span>
	                <span>Status</span>
	                <span>Receipt</span>
	            </div>

            <template for:each={filteredRows} for:item="row">
                <div key={row.id} class="table-row">
                    <span>{row.refundId}</span>
                    <span>{row.initiatedDate}</span>
                    <span>{row.currency}</span>
                    <span>{row.amount}</span>
                    <span>{row.refundDate}</span>
                    <span>{row.transactionId}</span>
                    <span class={row.statusClass}>{row.status}</span>
                    <template if:true={row.canDownloadReceipt}>
                        <button class="icon-button" type="button" data-id={row.id} onclick={handleDownload}>
                            <lightning-icon icon-name="utility:download" size="x-small" alternative-text="Download receipt"></lightning-icon>
                        </button>
                    </template>
                    <template if:false={row.canDownloadReceipt}>
                        <span></span>
                    </template>
                </div>
            </template>

            <template if:false={filteredRows.length}>
                <div class="empty-state">No refunds found.</div>
            </template>
        </div>

        <div class="mobile-list">
            <template for:each={filteredRows} for:item="row">
                <article key={row.id} class="mobile-card">
                    <div class="mobile-head">
                        <h3>{row.refundId}</h3>
                        <span class={row.statusClass}>{row.status}</span>
                    </div>
                    <div class="mobile-detail-list">
                        <div class="mobile-detail-row"><span>Transaction ID:</span><strong>{row.transactionId}</strong></div>
                        <div class="mobile-detail-row"><span>Initiated Date</span><strong>{row.initiatedDate}</strong></div>
                        <div class="mobile-detail-row"><span>Total Paid</span><strong>INR {row.amount}</strong></div>
                    </div>
                    <button class="cta-button cta-button-outline" type="button" data-id={row.id} onclick={handleDownload}>
                        <lightning-icon icon-name="utility:download" size="x-small" alternative-text="Download receipt"></lightning-icon>
                        Download Receipt
                    </button>
                </article>
            </template>
        </div>
    </section>
</template>
