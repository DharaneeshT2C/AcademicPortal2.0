<template>
    <div class="page">
        <h2 class="page-title">Messages</h2>
        <div class="chat-layout card">
            <div class="contacts-panel">
                <div class="contacts-header"><input type="text" placeholder="Search messages..." class="search-input" /></div>
                <div class="contacts-list">
                    <template for:each={formattedContacts} for:item="contact">
                        <div key={contact.id} class={contact.contactClass} data-id={contact.id} onclick={handleContactSelect}>
                            <div class="contact-avatar-wrap">
                                <img src={contact.avatar} alt={contact.name} class="contact-avatar-img" />
                                <template lwc:if={contact.online}><span class="online-dot"></span></template>
                            </div>
                            <div class="contact-info">
                                <div class="contact-header"><h4 class="contact-name">{contact.name}</h4><span class="contact-time">{contact.time}</span></div>
                                <p class="contact-last">{contact.lastMessage}</p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
            <div class="messages-panel">
                <div class="messages-header">
                    <img src={selectedContact.avatar} alt={selectedContact.name} class="chat-header-avatar" />
                    <div><h4 class="chat-name">{selectedContact.name}</h4><span class="chat-type">{selectedContact.type}</span></div>
                </div>
                <div class="messages-list">
                    <template for:each={formattedMessages} for:item="msg">
                        <div key={msg.id} class={msg.msgClass}>
                            <p class="msg-text">{msg.text}</p>
                            <span class="msg-time">{msg.time}</span>
                        </div>
                    </template>
                </div>
                <div class="message-input">
                    <input type="text" placeholder="Type a message..." class="msg-input" value={newMessage} onchange={handleMessageChange} />
                    <button class="send-btn" onclick={handleSend}><c-icon name="send" size="20"></c-icon></button>
                </div>
            </div>
        </div>
    </div>
</template>
