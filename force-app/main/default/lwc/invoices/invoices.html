<template>
    <div class="page">
        <div class="page-header">
            <h2 class="page-title">Invoice</h2>
            <p class="breadcrumb">Home &gt; Fee Payment</p>
        </div>
        <div class="tabs-row">
            <div class="tabs">
                <button class="tab" onclick={goFeePayment}>Fee Payment</button>
                <button class="tab" onclick={goFeePlan}>Fee Plan</button>
                <button class="tab active">Invoices</button>
                <button class="tab" onclick={goTransactions}>Transaction History</button>
                <button class="tab" onclick={goRefunds}>Refunds</button>
            </div>
            <div class="search-actions">
                <div class="search-bar"><c-icon name="search" size="16"></c-icon><input type="text" placeholder="Search by Keywords or Invoice ID" class="search-input" oninput={handleSearchInput} /></div>
                <button class="btn-outline" onclick={handleGetHelp}>Get Help</button>
            </div>
        </div>
        <div class="card">
            <table class="inv-table">
                <thead><tr><th>Particulars</th><th>Invoice ID</th><th>Invoice Date</th><th>Total Paid</th><th>Currency</th><th>Remaining</th><th>Pro - Forma Invoice</th><th>Invoice</th></tr></thead>
                <tbody>
                    <template for:each={filteredInvoices} for:item="inv">
                        <tr key={inv.id}>
                            <td>{inv.particulars}</td>
                            <td>{inv.invoiceId}</td>
                            <td>{inv.date}</td>
                            <td>{inv.totalPaid}</td>
                            <td>{inv.currency}</td>
                            <td><template lwc:if={inv.remaining}>{inv.remaining}</template><template lwc:else>--</template></td>
                            <td><template lwc:if={inv.proForma}><button class="dl-btn" data-id={inv.id} title="Download pro-forma invoice" onclick={handleDownload}><c-icon name="download" size="18"></c-icon></button></template></td>
                            <td>
                                <template lwc:if={inv.invoice}><button class="dl-btn" data-id={inv.id} title="Download invoice" onclick={handleDownload}><c-icon name="download" size="18"></c-icon></button></template>
                                <template lwc:else><span class="na">Not Available</span></template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</template>
