<template>
    <div class="rep-shell">
        <section class="rep-header">
            <div class="rep-copy">
                <h1 class="rep-title">Reports &amp; Analytics</h1>
                <p class="rep-subtitle">Generate operational and analytical hostel reports using the selected cycle and window.</p>
            </div>
        </section>

        <section class="rep-toolbar">
            <div class="rep-filters">
                <label class="rep-filter-card">
                    <span class="rep-filter-label">Cycle</span>
                    <select class="rep-select" value={selectedCycleId} onchange={handleCycleChange}>
                        <template for:each={cycleSelectOptions} for:item="option">
                            <option key={option.value} value={option.value} selected={option.isSelected}>{option.label}</option>
                        </template>
                    </select>
                </label>

                <label class="rep-filter-card">
                    <span class="rep-filter-label">Window</span>
                    <select class="rep-select" value={selectedWindowId} onchange={handleWindowChange}>
                        <option value="" selected={isWindowPlaceholderSelected}>{windowPlaceholderLabel}</option>
                        <template for:each={windowSelectOptions} for:item="option">
                            <option key={option.id} value={option.id} selected={option.isSelected}>{option.label}</option>
                        </template>
                    </select>
                </label>
            </div>

            <div class="rep-tools">
                <label class="rep-search" aria-label="Search reports">
                    <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                    <input type="search" placeholder="Search reports..." />
                </label>

                <button class="rep-export-btn" type="button" onclick={handleExportAll} disabled={exportDisabled}>
                    <lightning-icon icon-name="utility:download" size="x-small"></lightning-icon>
                    <span>Export All</span>
                </button>
            </div>
        </section>

        <template if:true={isLoadingReportData}>
            <section class="rep-loading">
                <lightning-spinner size="medium" alternative-text="Loading reports analytics"></lightning-spinner>
            </section>
        </template>

        <template if:true={hasSelectedWindow}>
            <template if:false={isLoadingReportData}>
                <section class="rep-summary-grid">
                    <template for:each={metricCards} for:item="card">
                        <article key={card.key} class={card.cardClass}>
                            <div class="rep-card-main">
                                <div class="rep-card-kicker">{card.label}</div>
                                <div class="rep-card-value">{card.value}</div>
                                <div class="rep-card-helper">{card.helper}</div>
                            </div>
                            <div class={card.iconClass}>
                                <lightning-icon icon-name={card.iconName} size="small"></lightning-icon>
                            </div>
                        </article>
                    </template>
                </section>

                <section class="rep-chart-grid">
                    <article class="rep-panel rep-panel--wide rep-report-panel rep-report-panel--building">
                        <div class="rep-panel-head rep-panel-head--split">
                            <h2 class="rep-panel-title">Building-wise Occupancy</h2>
                            <button
                                class="rep-link-btn"
                                type="button"
                                data-section="building"
                                onclick={handleSectionExport}
                                disabled={exportDisabled}
                            >
                                Export
                            </button>
                        </div>

                        <div class="rep-panel-body">
                            <template if:true={hasBuildingOccupancy}>
                                <div class="rep-building-chart">
                                    <div class="rep-chart-axis">
                                        <span>100%</span>
                                        <span>75%</span>
                                        <span>50%</span>
                                        <span>25%</span>
                                        <span>0%</span>
                                    </div>

                                    <div class="rep-chart-plot">
                                        <div class="rep-chart-grid-line rep-chart-grid-line--top"></div>
                                        <div class="rep-chart-grid-line rep-chart-grid-line--upper"></div>
                                        <div class="rep-chart-grid-line rep-chart-grid-line--middle"></div>
                                        <div class="rep-chart-grid-line rep-chart-grid-line--lower"></div>
                                        <div class="rep-chart-grid-line rep-chart-grid-line--bottom"></div>

                                        <div class="rep-bars" onmouseleave={handleBuildingLeave}>
                                            <template for:each={buildingChartItems} for:item="item">
                                                <div
                                                    key={item.key}
                                                    class="rep-bar-group"
                                                    data-key={item.key}
                                                    tabindex="0"
                                                    onmouseenter={handleBuildingEnter}
                                                    onfocus={handleBuildingEnter}
                                                    onblur={handleBuildingLeave}
                                                    onclick={handleBuildingActivate}
                                                >
                                                    <template if:true={item.tooltipVisible}>
                                                        <div class={item.tooltipClass}>
                                                            <div class="rep-building-tooltip-title">{item.buildingName}</div>
                                                            <div class="rep-building-tooltip-row">
                                                                <span class="rep-building-tooltip-dot rep-building-tooltip-dot--occupied"></span>
                                                                <span>Occupied: {item.occupiedPercentageLabel}</span>
                                                            </div>
                                                            <div class="rep-building-tooltip-row">
                                                                <span class="rep-building-tooltip-dot rep-building-tooltip-dot--available"></span>
                                                                <span>Available: {item.availablePercentageLabel}</span>
                                                            </div>
                                                        </div>
                                                    </template>
                                                    <div class="rep-bar-values">
                                                        <span>{item.occupiedPercentageLabel}</span>
                                                        <span>{item.availablePercentageLabel}</span>
                                                    </div>
                                                    <div class="rep-bar-stack">
                                                        <div
                                                            class="rep-bar rep-bar--occupied"
                                                            style={item.occupiedStyle}
                                                            title={item.occupiedBedsLabel}
                                                        ></div>
                                                        <div
                                                            class="rep-bar rep-bar--available"
                                                            style={item.availableStyle}
                                                            title={item.availableBedsLabel}
                                                        ></div>
                                                    </div>
                                                    <div class="rep-bar-caption" title={item.buildingName}>{item.shortLabel}</div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <div class="rep-legend rep-legend--chart">
                                    <div class="rep-legend-item">
                                        <span class="rep-legend-dot rep-legend-dot--occupied"></span>
                                        <span class="rep-legend-label">Occupied</span>
                                    </div>
                                    <div class="rep-legend-item">
                                        <span class="rep-legend-dot rep-legend-dot--available"></span>
                                        <span class="rep-legend-label">Available</span>
                                    </div>
                                </div>
                            </template>

                            <template if:false={hasBuildingOccupancy}>
                                <div class="rep-panel-empty">No building occupancy data for this window.</div>
                            </template>
                        </div>
                    </article>

                    <article class="rep-panel rep-panel--compact rep-report-panel rep-report-panel--distribution">
                        <div class="rep-panel-head rep-panel-head--split">
                            <h2 class="rep-panel-title">Allotment Type Distribution</h2>
                            <button
                                class="rep-link-btn"
                                type="button"
                                data-section="distribution"
                                onclick={handleSectionExport}
                                disabled={exportDisabled}
                            >
                                Export
                            </button>
                        </div>

                        <div class="rep-panel-body rep-panel-body--centered">
                            <template if:true={hasDistribution}>
                                <div class="rep-donut-shell">
                                    <div class="rep-donut-wrap" onmouseleave={handleDistributionLeave}>
                                        <svg class="rep-donut-svg" viewBox="0 0 180 180" aria-label="Allotment type distribution">
                                            <circle class="rep-donut-track" cx="90" cy="90" r="58"></circle>
                                            <template for:each={distributionItems} for:item="item">
                                                <path
                                                    key={item.key}
                                                    class={item.segmentClass}
                                                    d={item.segmentPath}
                                                    style={item.segmentStyle}
                                                    data-key={item.key}
                                                    aria-label={item.tooltipText}
                                                    tabindex="0"
                                                    onmouseenter={handleDistributionEnter}
                                                    onfocus={handleDistributionEnter}
                                                    onblur={handleDistributionLeave}
                                                    onclick={handleDistributionActivate}
                                                ></path>
                                            </template>
                                        </svg>
                                        <div class="rep-donut-hole"></div>
                                        <template if:true={activeDistributionTooltip}>
                                            <div class="rep-donut-tooltip" style={activeDistributionTooltip.tooltipStyle}>
                                                {activeDistributionTooltip.tooltipText}
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <div class="rep-legend">
                                    <template for:each={distributionItems} for:item="item">
                                        <div key={item.key} class="rep-legend-item">
                                            <span class="rep-legend-dot" style={item.swatchStyle}></span>
                                            <span class="rep-legend-label">{item.label}</span>
                                            <span class="rep-legend-value">{item.countLabel}</span>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template if:false={hasDistribution}>
                                <div class="rep-panel-empty">No allocated records for this window.</div>
                            </template>
                        </div>
                    </article>
                </section>

                <section class="rep-trend-section">
                    <article class="rep-panel rep-report-panel rep-report-panel--trend">
                        <div class="rep-panel-head rep-panel-head--split">
                            <h2 class="rep-panel-title">Monthly Allocation Trend</h2>
                            <button
                                class="rep-link-btn"
                                type="button"
                                data-section="trend"
                                onclick={handleSectionExport}
                                disabled={exportDisabled}
                            >
                                Export
                            </button>
                        </div>

                        <div class="rep-panel-body">
                            <template if:true={trendChartData}>
                                <div class="rep-trend-shell">
                                    <div class="rep-trend-wrap" onmouseleave={handleTrendLeave}>
                                        <svg class="rep-trend-svg" viewBox={trendChartData.viewBox} aria-label="Monthly allocation trend">
                                            <template for:each={trendChartData.yTicks} for:item="tick">
                                                <g key={tick.key}>
                                                    <line
                                                        class="rep-trend-grid-line"
                                                        x1={trendChartData.plotLeft}
                                                        y1={tick.y}
                                                        x2={trendChartData.plotRight}
                                                        y2={tick.y}
                                                    ></line>
                                                    <text class="rep-trend-axis-label" x="0" y={tick.textY}>{tick.label}</text>
                                                </g>
                                            </template>

                                            <template for:each={trendChartData.verticalGridLines} for:item="month">
                                                <line
                                                    key={month.key}
                                                    class="rep-trend-month-line"
                                                    x1={month.x}
                                                    y1={trendChartData.plotTop}
                                                    x2={month.x}
                                                    y2={trendChartData.plotBottom}
                                                ></line>
                                            </template>

                                            <line
                                                class="rep-trend-axis-line"
                                                x1={trendChartData.plotLeft}
                                                y1={trendChartData.plotBottom}
                                                x2={trendChartData.plotRight}
                                                y2={trendChartData.plotBottom}
                                            ></line>

                                            <template if:true={trendChartData.activeGuideLine}>
                                                <line
                                                    class="rep-trend-active-line"
                                                    x1={trendChartData.activeGuideLine.x}
                                                    y1={trendChartData.plotTop}
                                                    x2={trendChartData.activeGuideLine.x}
                                                    y2={trendChartData.plotBottom}
                                                ></line>
                                            </template>

                                            <template for:each={trendChartData.series} for:item="series">
                                                <path
                                                    key={series.key}
                                                    class="rep-trend-line"
                                                    d={series.path}
                                                    style={series.lineStyle}
                                                ></path>
                                            </template>

                                            <template for:each={trendChartData.series} for:item="series">
                                                <template for:each={series.points} for:item="point">
                                                    <circle
                                                        key={point.key}
                                                        class="rep-trend-point"
                                                        cx={point.x}
                                                        cy={point.y}
                                                        r={point.radius}
                                                        style={series.pointStyle}
                                                    ></circle>
                                                </template>
                                            </template>

                                            <template for:each={trendChartData.months} for:item="month">
                                                <text
                                                    key={month.labelKey}
                                                    class="rep-trend-x-label"
                                                    x={month.x}
                                                    y={month.xLabelY}
                                                >
                                                    {month.label}
                                                </text>
                                            </template>

                                            <template for:each={trendChartData.months} for:item="month">
                                                <rect
                                                    key={month.hotspotKey}
                                                    class="rep-trend-hotspot"
                                                    x={month.zoneX}
                                                    y={trendChartData.plotTop}
                                                    width={month.zoneWidth}
                                                    height={trendChartData.plotHeight}
                                                    data-key={month.key}
                                                    tabindex="0"
                                                    onmouseenter={handleTrendEnter}
                                                    onfocus={handleTrendEnter}
                                                    onblur={handleTrendLeave}
                                                    onclick={handleTrendActivate}
                                                ></rect>
                                            </template>
                                        </svg>

                                        <template if:true={trendChartData.activeTooltip}>
                                            <div
                                                class={trendChartData.activeTooltip.className}
                                                style={trendChartData.activeTooltip.style}
                                            >
                                                <div class="rep-trend-tooltip-title">{trendChartData.activeTooltip.label}</div>
                                                <template for:each={trendChartData.activeTooltip.rows} for:item="row">
                                                    <div key={row.key} class="rep-trend-tooltip-row">
                                                        <span class="rep-trend-tooltip-dot" style={row.swatchStyle}></span>
                                                        <span>{row.label}: {row.value}</span>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>

                                    <div class="rep-legend rep-legend--trend">
                                        <template for:each={trendChartData.legend} for:item="item">
                                            <div key={item.key} class="rep-legend-item">
                                                <span class="rep-legend-dot" style={item.swatchStyle}></span>
                                                <span class="rep-legend-label">{item.label}</span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>

                            <template if:false={trendChartData}>
                                <div class="rep-panel-empty">No monthly allocation trend data for this window.</div>
                            </template>
                        </div>
                    </article>
                </section>

                <section class="rep-performance-section">
                    <article class="rep-panel rep-report-panel rep-report-panel--performance">
                        <div class="rep-panel-head rep-panel-head--split">
                            <h2 class="rep-panel-title">Allotment Performance Summary</h2>
                            <button
                                class="rep-link-btn"
                                type="button"
                                data-section="performance"
                                onclick={handleSectionExport}
                                disabled={exportDisabled}
                            >
                                Export
                            </button>
                        </div>

                        <div class="rep-table-wrap">
                            <template if:true={hasAllotmentPerformanceSummary}>
                                <table class="rep-performance-table">
                                    <thead>
                                        <tr>
                                            <th scope="col">Allotment Type</th>
                                            <th scope="col">Total Applications</th>
                                            <th scope="col">Assigned</th>
                                            <th scope="col">Rejected</th>
                                            <th scope="col">Pending</th>
                                            <th scope="col">Avg Allocation Time</th>
                                            <th scope="col">Trend</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={allotmentPerformanceRows} for:item="row">
                                            <tr key={row.key} class={row.rowClass}>
                                                <th scope="row" class="rep-performance-cell rep-performance-cell--label">{row.label}</th>
                                                <td class="rep-performance-cell">{row.totalApplicationsLabel}</td>
                                                <td class="rep-performance-cell rep-performance-cell--success">{row.assignedLabel}</td>
                                                <td class="rep-performance-cell rep-performance-cell--danger">{row.rejectedLabel}</td>
                                                <td class="rep-performance-cell rep-performance-cell--danger">{row.pendingLabel}</td>
                                                <td class="rep-performance-cell rep-performance-cell--muted">{row.avgAllocationTimeLabel}</td>
                                                <td class="rep-performance-cell rep-performance-cell--muted">{row.trendLabel}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>

                            <template if:false={hasAllotmentPerformanceSummary}>
                                <div class="rep-panel-body">
                                    <div class="rep-panel-empty">No allotment performance records for this window.</div>
                                </div>
                            </template>
                        </div>
                    </article>
                </section>

                <section class="rep-insights-grid">
                    <article
                        class="rep-panel rep-panel--wide rep-insight-registration"
                        data-report-section="categoryRegistration"
                    >
                        <div class="rep-panel-head rep-panel-head--split">
                            <h2 class="rep-panel-title">Category-wise Registration</h2>
                            <button
                                class="rep-link-btn"
                                type="button"
                                data-section="categoryRegistration"
                                onclick={handleSectionExport}
                                disabled={exportDisabled}
                            >
                                Export
                            </button>
                        </div>

                        <div class="rep-panel-body">
                            <template if:true={hasCategoryRegistrations}>
                                <div class="rep-comparison-list">
                                    <template for:each={categoryRegistrationRows} for:item="row">
                                        <div key={row.key} class="rep-comparison-row">
                                            <div class="rep-comparison-head">
                                                <div class="rep-comparison-title">{row.label}</div>
                                                <div class="rep-comparison-meta">
                                                    <span>{row.registeredCountLabel}</span>
                                                </div>
                                            </div>

                                            <div class="rep-comparison-bar-set">
                                                <div class="rep-comparison-bar-line">
                                                    <div class="rep-comparison-track">
                                                        <div class="rep-comparison-fill rep-comparison-fill--registered" style={row.registeredStyle}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template if:false={hasCategoryRegistrations}>
                                <div class="rep-panel-empty">No category registration data for this window.</div>
                            </template>
                        </div>
                    </article>

                    <template for:each={financeReportCards} for:item="item">
                        <article key={item.key} class={item.panelClass} data-report-section={item.reportSection}>
                            <div class="rep-panel-head rep-panel-head--split">
                                <h2 class="rep-panel-title">{item.title}</h2>
                                <button
                                    class="rep-link-btn"
                                    type="button"
                                    data-section="finance"
                                    onclick={handleSectionExport}
                                    disabled={exportDisabled}
                                >
                                    Export
                                </button>
                            </div>

                            <div class="rep-panel-body rep-panel-body--centered rep-panel-body--finance-report">
                                <div class="rep-finance-report-shell">
                                    <div class="rep-donut-wrap rep-donut-wrap--finance-report">
                                        <svg class="rep-donut-svg" viewBox="0 0 180 180" aria-label={item.title}>
                                            <circle class="rep-donut-track" cx="90" cy="90" r="58"></circle>
                                            <template if:true={item.segmentPath}>
                                                <path
                                                    class="rep-finance-segment"
                                                    d={item.segmentPath}
                                                    style={item.segmentStyle}
                                                ></path>
                                            </template>
                                        </svg>
                                        <div class="rep-donut-hole rep-donut-hole--finance-report">
                                            <div class="rep-finance-center-label">{item.label}</div>
                                            <div class="rep-finance-center-value rep-finance-center-value--compact">{item.amountLabel}</div>
                                        </div>
                                    </div>
                                    <div class="rep-finance-report-helper">{item.helper}</div>
                                </div>
                            </div>
                        </article>
                    </template>

                    <article
                        class="rep-panel rep-panel--wide rep-insight-occupancy"
                        data-report-section="categoryOccupancy"
                    >
                        <div class="rep-panel-head rep-panel-head--split">
                            <h2 class="rep-panel-title">Category-wise Occupancy</h2>
                            <button
                                class="rep-link-btn"
                                type="button"
                                data-section="categoryOccupancy"
                                onclick={handleSectionExport}
                                disabled={exportDisabled}
                            >
                                Export
                            </button>
                        </div>

                        <div class="rep-panel-body rep-panel-body--occupancy-compact">
                            <template if:true={hasCategoryOccupancy}>
                                <div class="rep-building-chart">
                                    <div class="rep-chart-axis">
                                        <span>100%</span>
                                        <span>75%</span>
                                        <span>50%</span>
                                        <span>25%</span>
                                        <span>0%</span>
                                    </div>

                                    <div class="rep-chart-plot">
                                        <div class="rep-chart-grid-line rep-chart-grid-line--top"></div>
                                        <div class="rep-chart-grid-line rep-chart-grid-line--upper"></div>
                                        <div class="rep-chart-grid-line rep-chart-grid-line--middle"></div>
                                        <div class="rep-chart-grid-line rep-chart-grid-line--lower"></div>
                                        <div class="rep-chart-grid-line rep-chart-grid-line--bottom"></div>

                                        <div class="rep-bars" onmouseleave={handleCategoryOccupancyLeave}>
                                            <template for:each={categoryOccupancyChartItems} for:item="item">
                                                <div
                                                    key={item.key}
                                                    class="rep-bar-group"
                                                    data-key={item.key}
                                                    tabindex="0"
                                                    onmouseenter={handleCategoryOccupancyEnter}
                                                    onfocus={handleCategoryOccupancyEnter}
                                                    onblur={handleCategoryOccupancyLeave}
                                                    onclick={handleCategoryOccupancyActivate}
                                                >
                                                    <template if:true={item.tooltipVisible}>
                                                        <div class={item.tooltipClass}>
                                                            <div class="rep-building-tooltip-title">{item.categoryName}</div>
                                                            <div class="rep-building-tooltip-row">
                                                                <span class="rep-building-tooltip-dot rep-building-tooltip-dot--occupied"></span>
                                                                <span>Occupied: {item.occupiedPercentageLabel}</span>
                                                            </div>
                                                            <div class="rep-building-tooltip-row">
                                                                <span class="rep-building-tooltip-dot rep-building-tooltip-dot--available"></span>
                                                                <span>Available: {item.availablePercentageLabel}</span>
                                                            </div>
                                                        </div>
                                                    </template>
                                                    <div class="rep-bar-values">
                                                        <span>{item.occupiedPercentageLabel}</span>
                                                        <span>{item.availablePercentageLabel}</span>
                                                    </div>
                                                    <div class="rep-bar-stack">
                                                        <div
                                                            class="rep-bar rep-bar--occupied"
                                                            style={item.occupiedStyle}
                                                            title={item.occupiedBedsLabel}
                                                        ></div>
                                                        <div
                                                            class="rep-bar rep-bar--available"
                                                            style={item.availableStyle}
                                                            title={item.availableBedsLabel}
                                                        ></div>
                                                    </div>
                                                    <div class="rep-bar-caption" title={item.categoryName}>{item.shortLabel}</div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <div class="rep-legend rep-legend--chart">
                                    <div class="rep-legend-item">
                                        <span class="rep-legend-dot rep-legend-dot--occupied"></span>
                                        <span class="rep-legend-label">Occupied</span>
                                    </div>
                                    <div class="rep-legend-item">
                                        <span class="rep-legend-dot rep-legend-dot--available"></span>
                                        <span class="rep-legend-label">Available</span>
                                    </div>
                                </div>
                            </template>

                            <template if:false={hasCategoryOccupancy}>
                                <div class="rep-panel-empty">No category occupancy data for this window.</div>
                            </template>
                        </div>
                    </article>
                </section>
            </template>
        </template>

        <template if:true={showEmptyState}>
            <section class="rep-empty">
                <div class="rep-empty-title">No window selected</div>
                <div class="rep-empty-copy">Choose a hostel cycle and window to generate reports analytics.</div>
            </section>
        </template>
    </div>
</template>
