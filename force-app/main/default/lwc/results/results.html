<template>
    <div class="page">
        <h2 class="page-title">Results</h2>
        <div class="results-top">
            <div class="main-col">
                <div class="card chart-card">
                    <div class="chart-header">
                        <h3 class="section-title">Semester Breakup</h3>
                        <div class="chart-meta">Credits Earned: <strong>{student.CreditsEarned}/{student.TotalCredits}</strong> &nbsp;| &nbsp;CGPA: <strong>{student.CGPA}</strong></div>
                    </div>
                    <div class="line-chart-container">
                        <div class="chart-y-axis">
                            <span>10</span><span>8</span><span>6</span><span>4</span><span>2</span><span>0</span>
                        </div>
                        <div class="chart-area">
                            <div class="chart-grid-lines">
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                            </div>
                            <svg class="line-svg" viewBox="0 0 700 200" preserveAspectRatio="none">
                                <polyline class="chart-line" points={linePoints} fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
                                <template for:each={chartDots} for:item="dot">
                                    <circle key={dot.key} cx={dot.cx} cy={dot.cy} r="4" fill="#10b981" stroke="#fff" stroke-width="2"></circle>
                                </template>
                                <template for:each={chartLabels} for:item="label">
                                    <text key={label.key} x={label.x} y={label.y} fill="#374151" font-size="11" text-anchor="middle">{label.text}</text>
                                </template>
                            </svg>
                            <div class="chart-x-labels">
                                <template for:each={semesterBars} for:item="bar">
                                    <span key={bar.key}>{bar.sem}</span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="right-col">
                <div class="grade-card">
                    <h3 class="grade-title">Semester Grade Card</h3>
                    <p class="grade-subtitle">CGPA {student.CGPA} &middot; {student.CreditsEarned} Credits</p>
                    <div class="grade-illustration">
                        <c-icon name="school" size="80"></c-icon>
                    </div>
                    <button class="btn-grade" onclick={handleViewGradeCards}>View all Grade Cards &rarr;</button>
                </div>
            </div>
        </div>

        <div class="card marks-section">
            <div class="marks-header">
                <h3 class="section-title">Marks Breakdown</h3>
                <div class="marks-meta">
                    Credits Earned: <strong>{student.CreditsEarned}/{student.TotalCredits}</strong> &nbsp;| &nbsp;CGPA: <strong>{student.CGPA}</strong>
                    <select class="semester-select"><option>Semester I</option></select>
                    <span class="current-badge"><c-icon name="circle" size="8"></c-icon> Current</span>
                </div>
            </div>
            <table class="marks-table">
                <thead>
                    <tr>
                        <th>Course Name</th>
                        <th>Course Code</th>
                        <th>Credits</th>
                        <th>Credits Earned</th>
                        <th>Composite Score</th>
                        <th>Grade</th>
                        <th>Marks Breakdown</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={data.marksBreakdown} for:item="item">
                        <tr key={item.code} onclick={handleMarksBreakdown}>
                            <td>{item.course}</td>
                            <td>{item.code}</td>
                            <td>{item.credits}</td>
                            <td>{item.creditsEarned}</td>
                            <td>{item.compositeScore}</td>
                            <td><span class={item.gradeClass}>{item.grade}</span></td>
                            <td><c-icon name="visibility" size="18"></c-icon></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</template>
