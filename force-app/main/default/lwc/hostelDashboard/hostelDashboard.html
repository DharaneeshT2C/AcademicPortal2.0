<template>
    <c-custom-toast></c-custom-toast>
    <template if:false={isThemeLoaded}>
        <div class="skeleton-wrap">
            <div class="skeleton-row">
                <div class="skeleton-card-large"></div>
                <div class="skeleton-card-small"></div>
            </div>
            <div class="skeleton-row">
                <div class="skeleton-card-medium"></div>
                <div class="skeleton-card-medium"></div>
            </div>
        </div>
    </template>
    <div class={dashboardContainerClass}>
        <!-- LEFT COLUMN -->
        <div class="left-column">
            <!-- Details & Allocation Row -->
            <div class="details-row">
                <!-- Wrapper for Grid Item 1 -->
                <!-- Wrapper for Grid Item 1 -->
                <div class="details-wrapper">
                    <div class="section-header">
                        <div class="section-title">Hostel Details</div>
                        <button class="btn-outline" onclick={handleViewDetails} disabled={isViewDetailsDisabled}>View Details</button>
                    </div>

                    <div class="card details-section-card">
                        <!-- Room Info Card -->
                        <div class="details-inner-card room-card-mb">
                            <div class="room-header">
                                <span class="room-number">{roomDetails.number}</span>
                                <span class="room-badge">{roomDetails.type}</span>
                            </div>
                            <div class="room-details-row">
                                <img src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 viewBox%3D%220 0 100 100%22%3E%3Crect width%3D%22100%22 height%3D%22100%22 fill%3D%22%23E0E0E0%22/%3E%3Cpath d%3D%22M20 80 L50 30 L80 80 Z%22 fill%3D%22%23BDBDBD%22/%3E%3C/svg%3E" class="loc-img" alt="Building">
                                
                                <div class="loc-info">
                                    <h4>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                        </svg>
                                        {roomDetails.hall}
                                    </h4>
                                    <p>{roomFeaturesText}</p>
                                </div>
                            </div>
                        </div>

                        <!-- People Info Card -->
                        <div class="details-inner-card">
                            <div class="people-grid">
                                <div class="roommates-section">
                                    <div class="person-group-title">Roommates ({roommates.length})</div>
                                    <template for:each={roommates} for:item="mate">
                                        <div key={mate.id} class="person-item">
                                            <img src={mate.avatar} class="person-avatar" alt={mate.name}>
                                            <div class="person-details">
                                                <h5>{mate.name}</h5>
                                                <p>{mate.studentId}</p>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <div class="warden-section">
                                    <div class="person-group-title">Warden Details</div>
                                    <div class="person-details">
                                        <h5>{warden.name}</h5>
                                        <div class="contact-item">
                                            <svg class="contact-icon" viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-2.2 2.2a15.161 15.161 0 01-6.59-6.59l2.2-2.21c.28-.26.36-.65.25-1.01A11.36 11.36 0 018.59 3.99c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z"/>
                                            </svg>
                                            {warden.phone}
                                        </div>
                                        <div class="contact-item">
                                            <svg class="contact-icon" viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                                            </svg>
                                            {warden.email}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                        </div>
                    </div>
                    <button class="btn-white" onclick={handleGetStarted} disabled={isGetStartedDisabled}>Get Started</button>
                </div>
            </div>

            <!-- In & Out Section + Leave Requests -->
            <div class="in-out-section">
                <!-- Header/Tabs -->
                <div class="in-out-actions">
                    <div class="tabs">
                        <div class={inOutTabClass} onclick={handleTabChange} data-tab="in-out">Hostel- In & Out</div>
                        <div class={leaveRequestsTabClass} onclick={handleTabChange} data-tab="leave-requests">Leave Requests</div>
                    </div>
                    <div class="tab-actions">
                        <template if:true={isLeaveRequestsTab}>
                             <button class="btn-outline" style="margin-right:12px; height: 36px; padding: 0 16px;">View All</button>
                        </template>
                        <button class="btn-primary" onclick={handleOpenModal}>Request Leave Of Absence</button>
                    </div>
                </div>

                <!-- Tab Content: In & Out -->
                <template if:true={isInOutTab}>
                    <div class="card table-card">
                        <div class="data-table">
                            <div class="header-row">
                                <div class="header-cell">Date</div>
                                <div class="header-cell">Day</div>
                                <div class="header-cell">Time</div>
                                <div class="header-cell" >Status</div>
                            </div>
                            <template for:each={inOutRecords} for:item="rec">
                                <div key={rec.id} class="row">
                                    <div class="cell">{rec.date}</div>
                                    <div class="cell">{rec.day}</div>
                                    <div class="cell">{rec.time}</div>
                                    <div class="cell status-cell">
                                        <span class={rec.statusClass}>{rec.status}</span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Tab Content: Leave Requests -->
                <template if:true={isLeaveRequestsTab}>
                    <div class="leave-requests-list">
                        <template for:each={leaveRequests} for:item="req">
                            <div key={req.id} class="leave-req-card">
                                <div class="req-header">
                                    <span class="req-id">{req.requestId}</span>
                                    <div class="req-meta-right">
                                        <template if:false={req.isClosed}>
                                            <span class="meta-label">Submitted on: <strong>{req.submittedOn}</strong></span>
                                        </template>
                                        <template if:true={req.isClosed}>
                                            <span class="meta-label">Closed on: <strong>{req.closedOn}</strong></span>
                                        </template>
                                        
                                        <span class={req.statusClass}>{req.status}</span>
                                        
                                        <template if:false={req.isClosed}>
                                            <button class="btn-outline btn-sm">Withdraw</button>
                                        </template>
                                        <template if:true={req.isClosed}>
                                            <button class="btn-primary btn-sm">Leave Feedback</button>
                                        </template>
                                    </div>
                                </div>
                                <div class="req-title">{req.title}</div>
                                <div class="req-type">Type: <span class="text-gray">{req.type}</span></div>
                                
                                <template if:false={req.isClosed}>
                                    <div class="req-desc">{req.description}</div>
                                    <div class="req-dates">Leave Dates: <strong>{req.dates}</strong></div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-column">
            <!-- Bills Section -->
            <div class="card">
                <div class="section-header">
                    <div class="section-title">Bills and Payments</div>
                    <button class="btn-primary" style="padding: 6px 12px; font-size: 0.8rem;">Pay Now</button>
                </div>
                <template for:each={bills} for:item="bill">
                    <div key={bill.id} class="bill-item">
                        <div class="bill-head">
                            <span class="bill-name">{bill.label}: {bill.amount}</span>
                            <span class="bill-due-tag">{bill.dueDate}</span>
                        </div>
                        <div class="bill-total">Total used: {bill.totalUsed} of {bill.limit}</div>
                    </div>
                </template>
            </div>

            <!-- Notices Section -->
            <div class="card notices-section">
                <div class="section-header">
                    <div class="section-title">Hostel Notice Board</div>
                </div>
                <div class="notice-list">
                    <template for:each={notices} for:item="notice">
                        <div key={notice.id} class="notice-card">
                            <div class="notice-top">
                                <div class="notice-user">
                                    <div class="notice-icon-circle">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                                        </svg>
                                    </div>
                                    {notice.author}
                                </div>
                                <span class="notice-tag">{notice.tag}</span>
                            </div>
                            <div class="notice-content">
                                {notice.title}
                                <template if:true={notice.extraInfo}>
                                    <br/><span style="color:#6B7280; font-size:0.85rem; display:block; margin-top:4px;">{notice.extraInfo}</span>
                                </template>
                            </div>
                            <div class="notice-meta">{notice.date}</div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" class="modal-overlay">
            <div class="modal-backdrop-blur"></div>
            <div class="modal-container-wrapper">
                 <div class="modal-container">
                    <header class="modal-header">
                        <h2 id="modal-heading-01" class="modal-title">Apply for Leave of Absence</h2>
                    </header>
                    <div class="modal-content">
                        
                        <div class="form-group">
                            <label class="form-label">Leave Type<span class="required">*</span></label>
                            <div class="custom-select-wrapper">
                                <select class="form-input select-input">
                                    <option>Select</option>
                                    <option>Personal leave</option>
                                    <option>Exception</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Dates<span class="required">*</span></label>
                            <div class="date-input-wrapper">
                                 <input type="date" class="form-input" />
                                 <span class="calendar-icon">
                                     <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                     </svg>
                                 </span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Number of Days</label>
                            <div class="read-only-input">2</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Reason (Optional)</label>
                            <textarea class="form-input textarea-input" placeholder="Describe" rows="4"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Upload Supporting Document (Optional)</label>
                            <div class="file-upload-wrapper">
                                <input type="text" class="form-input" placeholder="Upload" value={uploadedFileName} readonly />
                                <input type="file" class="file-input-hidden" onchange={handleFileUpload} />
                                 <span class="upload-icon">
                                     <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                     </svg>
                                 </span>
                            </div>
                        </div>

                    </div>
                    <footer class="modal-footer">
                        <button class="btn-outline" onclick={handleCancelModal}>Cancel</button>
                        <button class="btn-primary" onclick={handleCloseModal}>Submit</button>
                    </footer>
                </div>
            </div>
        </section>
        <div class="modal-backdrop" onclick={handleCloseModal}></div>
    </template>
</template>
