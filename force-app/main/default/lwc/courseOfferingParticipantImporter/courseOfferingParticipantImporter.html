<template>
    <section class="upload-stage">
        <div class="section-title upload-stage-title">Upload Import File</div>
        <div class="import-controls">
            <div class="upload-layout">
                <div class="file-area">
                    <div class="file-card">
                        <div class="provider-group upload-provider-group">
                            <div class="field-group">
                                <label class="field-label">Exam Cycle</label>
                                <lightning-combobox
                                    variant="label-hidden"
                                    label="Exam Cycle"
                                    value={selectedExamCycleId}
                                    options={examCycleOptions}
                                    placeholder="Select Exam Cycle"
                                    onchange={handleExamCycleChange}
                                ></lightning-combobox>
                            </div>
                        </div>
                        <template if:true={hasSelectedTerm}>
                            <div class="file-status">
                                <span class="file-name">{selectedExamCycleSummary}</span>
                            </div>
                        </template>
                        <template if:false={hasFile}>
                            <div class="file-content">
                                <div class="file-icon" aria-hidden="true">
                                    <lightning-icon icon-name="doctype:csv" size="medium"></lightning-icon>
                                </div>
                                <div class="file-meta">
                                    <div class="file-title">Drag and drop CSV file here</div>
                                    <div class="file-subtitle">Use the Course Offering Participant template after selecting Exam Cycle.</div>
                                </div>
                                <div class="file-actions">
                                    <input id="participantFileInput" class="hidden-input" type="file" accept=".csv" onchange={handleFileChange} />
                                    <label for="participantFileInput" class="file-button">Choose file</label>
                                </div>
                            </div>
                        </template>
                        <template if:true={hasFile}>
                            <div class="selected-file-card">
                                <div class="selected-file-main">
                                    <div class="file-icon" aria-hidden="true">
                                        <lightning-icon icon-name="doctype:csv" size="medium"></lightning-icon>
                                    </div>
                                    <div class="selected-file-copy">
                                        <button class="selected-file-name" type="button" onclick={handleFileNameClick}>{fileName}</button>
                                        <div class="selected-file-meta">
                                            <span class="selected-file-count">{rows.length} rows</span>
                                            <span>Click the file name to preview imported data.</span>
                                        </div>
                                    </div>
                                </div>
                                <lightning-button-icon class="selected-file-delete" icon-name="utility:delete" alternative-text="Remove file" title="Remove file" onclick={handleDeleteFile} variant="bare"></lightning-button-icon>
                            </div>
                        </template>
                    </div>
                </div>
                <div class="action-panel">
                    <div class="actions">
                        <lightning-button label="Download Template" icon-name="utility:download" onclick={handleDownloadTemplate} stretch></lightning-button>
                        <lightning-button label="View Help" icon-name="utility:info" onclick={handleOpenHelp} stretch></lightning-button>
                        <lightning-button label="Download Failed" icon-name="utility:download" onclick={handleDownloadFailed} disabled={failedDownloadDisabled} stretch></lightning-button>
                        <lightning-button class="import-button" label="Import" variant="brand" icon-name="utility:upload" onclick={handleImport} disabled={importDisabled} stretch></lightning-button>
                    </div>
                    <template if:true={jobId}>
                        <div class="batch-status">
                            Status: {jobStatus} - Processed {processedDisplay}/{totalRecords} - Errors {failedCount}
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </section>

    <template if:true={hasValidationErrors}>
        <section class="import-section slds-m-top_medium">
            <div class="section-title">Validation Errors</div>
            <div class="preview">
                <div class="client-errors">
                    <div class="error-title">Fix these rows before import</div>
                    <template for:each={validationErrors} for:item="error">
                        <div key={error.key} class="error-line">{error.message}</div>
                    </template>
                </div>
            </div>
        </section>
    </template>

    <template if:true={showPreview}>
        <section class="import-section slds-m-top_medium" data-preview-section>
            <div class="section-title">Import Preview</div>
            <div class="preview">
                <div class="preview-header">
                    <div class="preview-title">Participant Import</div>
                    <div class="preview-meta">Showing {displayedRows.length} of {rows.length}</div>
                </div>
                <div class="preview-table-wrap">
                    <table class="preview-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <template for:each={headers} for:item="header">
                                    <th key={header}>{header}</th>
                                </template>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={previewRowValues} for:item="row">
                                <tr key={row.key}>
                                    <td>{row.number}</td>
                                    <template for:each={row.cells} for:item="cell">
                                        <td key={cell.key}>{cell.value}</td>
                                    </template>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </template>

    <template if:true={showHelpModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="cop-import-help-heading" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container import-help-modal">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseHelp}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="cop-import-help-heading" class="slds-text-heading_medium">Participant Import Help</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium import-help-content">
                    <ul class="import-help-list">
                        <li><span>Exam Cycle</span> is required before importing.</li>
                        <li>The selected <span>Exam Cycle</span> determines the <span>Academic Term</span> used for import.</li>
                        <li><span>Course Offering Name</span> must match an offering under that Academic Term.</li>
                        <li><span>Participant Email</span> must match an existing student and <span>Participation Status</span> valid values are: {participationStatusHelpText}</li>
                        <li><span>Exam Type</span> is optional and dates should be in <span>YYYY-MM-DD</span> format.</li>
                    </ul>
                    <div class="import-help-example-title">Example row</div>
                    <div class="import-help-table-wrap">
                        <table class="import-help-table">
                            <thead>
                                <tr>
                                    <template for:each={headers} for:item="header">
                                        <th key={header}>{header}</th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <template for:each={helpRow} for:item="cell">
                                        <td key={cell.key}>{cell.value}</td>
                                    </template>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={handleCloseHelp}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
