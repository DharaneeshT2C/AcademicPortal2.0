<template>
    <div class="sidebar">
        <button class="close-btn mobile-only" onclick={handleClose}>
            <c-icon name="close" size="20"></c-icon>
        </button>

        <div class="profile-section">
            <div class="avatar-initials">{avatarInitials}</div>
            <div class="student-name-row">
                <h3 class="student-name">{student.FirstName} {student.LastName}</h3>
                <button class="sidebar-settings-btn" aria-label="Settings" onclick={handleOpenSettings}>
                    <c-icon name="settings" size="13"></c-icon>
                </button>
            </div>
            <p class="student-program">{programLabel}</p>
            <div class="student-micro">
                <c-icon name="bolt" size="14" class="streak-bolt"></c-icon>
                <!-- <span>{streakText}</span>
                <span class="micro-sep" aria-hidden="true"></span>
                <span>{attendanceText}</span> -->
            </div>
        </div>

        <nav class="nav-list">
            <template for:each={navItems} for:item="item">
                <div key={item.id} class="nav-item-wrapper">
                    <template lwc:if={item.isSection}>
                        <span class="nav-section-label">{item.label}</span>
                    </template>
                    <template lwc:else>
                        <button
                            class={item.navClass}
                            data-route={item.route}
                            data-id={item.id}
                            data-haschildren={item.hasChildrenStr}
                            onclick={handleNavClick}
                        >
                            <c-icon name={item.icon} size="18"></c-icon>
                            <span class="nav-label">{item.label}</span>
                            <template lwc:if={item.hasChildren}>
                                <c-icon name={item.chevronIcon} size="16" class="nav-chevron"></c-icon>
                            </template>
                        </button>
                        <template lwc:if={item.hasChildren}>
                            <div class={item.childrenClass}>
                                <template for:each={item.children} for:item="child">
                                    <button
                                        key={child.id}
                                        class={child.childClass}
                                        data-route={child.route}
                                        onclick={handleChildClick}
                                    >
                                        <span class="nav-child-label">{child.label}</span>
                                        <template lwc:if={child.dot}>
                                            <span class="nav-dot"></span>
                                        </template>
                                    </button>
                                </template>
                            </div>
                        </template>
                    </template>
                </div>
            </template>
        </nav>

        <div class="sidebar-footer">
            <div class="footer-brand">
                <div class="footer-k-logo">K</div>
                <div class="footer-brand-text">
                    <span class="footer-uni-name">Ken University</span>
                    <span class="footer-powered">Powered by Ken42</span>
                </div>
            </div>
            <button class="logout-btn" onclick={handleLogout}>
                <c-icon name="logout" size="18"></c-icon>
                <span>Logout</span>
            </button>
        </div>
    </div>
</template>
