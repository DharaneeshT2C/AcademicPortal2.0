<template>
    <template if:true={showSkeleton}>
        <header class="portal-header skeleton-wrap" aria-busy="true" aria-live="polite">
            <section class="title-panel">
                <div class="skeleton-line skeleton-title"></div>
            </section>
            <section class="actions-panel">
                <div class="skeleton-icons">
                    <div class="skeleton-icon"></div>
                    <div class="skeleton-icon"></div>
                    <div class="skeleton-icon"></div>
                    <div class="skeleton-icon"></div>
                </div>
                <div class="divider" aria-hidden="true"></div>
                <div class="skeleton-line skeleton-logo"></div>
            </section>
        </header>
    </template>

    <template if:false={showSkeleton}>
    <header class="portal-header">
        <section class="title-panel">
            <div class="title-stack">
                <h1>Course Enrolment</h1>
                <nav class="breadcrumbs" aria-label="Breadcrumb">
                    <span class="crumb">Home</span>
                    <span class="crumb-separator" aria-hidden="true">></span>
                    <span class="crumb current">Course Enrolment</span>
                </nav>
            </div>
        </section>

        <section class="actions-panel" aria-label="Header actions">
            <div class="icon-row">
                <button class="icon-button" type="button" aria-label="Calendar">
                    <lightning-icon icon-name="utility:event" size="x-small"></lightning-icon>
                </button>
                <button class="icon-button" type="button" aria-label="Messages">
                    <lightning-icon icon-name="utility:chat" size="x-small"></lightning-icon>
                </button>
                <button class="icon-button" type="button" aria-label="Settings">
                    <lightning-icon icon-name="utility:settings" size="x-small"></lightning-icon>
                </button>
                <button class="icon-button bell-active" type="button" aria-label="Notifications">
                    <lightning-icon icon-name="utility:notification" size="x-small"></lightning-icon>
                </button>
            </div>
            <div class="divider" aria-hidden="true"></div>
            <div class="logo-wrap">
                <img class="logo-image" src={ken42Logo} alt="KEN42 Logo" />
            </div>
        </section>
    </header>
    </template>
</template>
