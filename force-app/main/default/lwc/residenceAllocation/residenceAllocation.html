<template>
    <template if:false={isThemeLoaded}>
        <div class="skeleton-wrap">
            <div class="skeleton-card-tall"></div>
            <div class="skeleton-card-wide"></div>
        </div>
    </template>
    <div class={allocationPageClass}>
        <!-- Progress Tracker Card -->
        <div class="tracker-card">
            <div class="progress-header">
                <h1 class="page-title">Residence Allocation Progress</h1>
                <button class="btn-help" onclick={handleOpenHelpModal}>Get Help</button>
            </div>

            <div class="progress-tracker">
                <div class="progress-step">
                    <div class={step1CircleClass}></div>
                    <div class={step1BoxClass}>Preference Submission</div>
                </div>
                <div class="progress-step">
                    <div class={step2CircleClass}></div>
                    <div class={step2BoxClass}>{step2Label}</div>
                </div>
                <div class="progress-step">
                    <div class={step3CircleClass}></div>
                    <div class={step3BoxClass}>Provisional Allotment</div>
                </div>
                <div class="progress-step">
                    <div class={step4CircleClass}></div>
                    <div class={step4BoxClass}>Residence Allotment</div>
                </div>
            </div>
        </div>

        <!-- Initial State: Get Started -->
        <template if:true={isInitialState}>
            <div class="content-section">
                <div class="get-started-card">
                    <h2 class="section-heading">Get Started with Residence Allocation</h2>
                    <p class="section-description">{initialStateDescription}</p>
                    <button class="btn-primary" onclick={handleGetStarted} disabled={isGetStartedDisabled}>Get Started</button>
                </div>

                <div class="info-card">
                    <h3 class="info-title">Important Information</h3>
                    <ul class="info-list">
                        <li>Failure to confirm will result in allocation being released to others</li>
                        <li>You can select up to 3 residence preferences in order of priority</li>
                        <li>Allocation is based on availability and academic performance</li>
                        <li>Review typically takes 3-6 working days after submission</li>
                        <li>Payment must be completed within 7 days of provisional allocation</li>
                    </ul>
                </div>
            </div>
        </template>

        <!-- Under Review State -->
        <template if:true={isUnderReviewState}>
            <div class="content-section">
                <div class="status-card submitted">
                    <h2 class="status-heading">Residence Request Submitted</h2>
                    <p class="status-description">We've received your preferences. The Residence Office will review your request and notify you once a decision is made.</p>
                    
                    <div class="status-badge-wrapper submitted-badge">
                        <svg class="status-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="10" cy="10" r="10" fill="#F59E0B"/>
                            <path d="M10 6V10L12 12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span class="status-text">Residence Request Submitted</span>
                    </div>
                </div>

                <div class="preferences-card submitted-style">
                    <div class="preferences-header">
                        <h3 class="preferences-title">Your Submitted Preferences</h3>
                        <div class="submitted-date">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            Submitted on: {submittedOnLabel}
                        </div>
                    </div>

                    <template for:each={preferences} for:item="pref">
                        <div key={pref.id} class="preference-item">
                            <div class="pref-main">

                        <svg width="34" height="34" viewBox="0 0 34 34" fill="none" class="status-icon success-icon" xmlns="http://www.w3.org/2000/svg">
                            <mask id="mask0_15645_169413" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="34" height="34">
                                <rect width="34" height="34" fill="#D9D9D9"/>
                            </mask>
                            <g mask="url(#mask0_15645_169413)">
                                <path d="M15.0193 23.5193L25.0068 13.5318L23.0234 11.5484L15.0193 19.5526L10.9818 15.5151L8.99844 17.4984L15.0193 23.5193ZM17.0026 31.1693C15.0429 31.1693 13.2012 30.7972 11.4776 30.0529C9.75399 29.3097 8.25469 28.3005 6.97969 27.0255C5.70469 25.7505 4.69555 24.2512 3.95227 22.5276C3.20805 20.804 2.83594 18.9623 2.83594 17.0026C2.83594 15.0429 3.20805 13.2012 3.95227 11.4776C4.69555 9.75399 5.70469 8.25469 6.97969 6.97969C8.25469 5.70469 9.75399 4.69508 11.4776 3.95085C13.2012 3.20758 15.0429 2.83594 17.0026 2.83594C18.9623 2.83594 20.804 3.20758 22.5276 3.95085C24.2512 4.69508 25.7505 5.70469 27.0255 6.97969C28.3005 8.25469 29.3097 9.75399 30.0529 11.4776C30.7972 13.2012 31.1693 15.0429 31.1693 17.0026C31.1693 18.9623 30.7972 20.804 30.0529 22.5276C29.3097 24.2512 28.3005 25.7505 27.0255 27.0255C25.7505 28.3005 24.2512 29.3097 22.5276 30.0529C20.804 30.7972 18.9623 31.1693 17.0026 31.1693Z" fill="#338137"/>
                            </g>
                        </svg>
                            <div>
                                <h2 class="status-heading">Provisional Residence Allocated</h2>
                                <p class="status-description">Your residence has been provisionally allocated. Complete payment to confirm.</p>
                            </div>
                        </div>
                        <div class="payment-due">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            <template if:true={hasPaymentDeadline}>
                                Payment Due: {paymentDeadline}
                            </template>
                            <template if:false={hasPaymentDeadline}>
                                Payment Due not set
                            </template>
                        </div>
                    </div>
                    <button class="btn-primary-large" onclick={handleViewDetailsAndPay}>View Details &amp; Pay Now</button>
                </div>

                <div class="allocation-details-card">
                    <div class="allocation-header">
                        <div class="residence-image">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 21h18M5 21V7l8-4 8 4v14M8 21v-4h8v4"/>
                            </svg>
                        </div>
                        <div class="allocation-title-section">
                            <h3 class="allocation-type">{allotmentDetails.subtitle}</h3>
                            <p class="allocation-features">{allotmentDetails.featureLine}</p>
                        </div>
                        <button class="btn-outline-small" onclick={handleOpenAmenities}>View Amenities</button>
                    </div>

                    <div class="allocation-grid">
                        <div class="grid-item">
                            <div class="grid-label">Building</div>
                            <div class="grid-value">{allotmentDetails.building}</div>
                        </div>
                        <div class="grid-item">
                            <div class="grid-label">Room Number</div>
                            <div class="grid-value">{allotmentDetails.roomNumber}</div>
                        </div>
                        <div class="grid-item">
                            <div class="grid-label">Floor</div>
                            <div class="grid-value">{allotmentDetails.floor}</div>
                        </div>
                        <div class="grid-item">
                            <div class="grid-label">Check-in Date</div>
                            <div class="grid-value">{allotmentDetails.checkInDate}</div>
                        </div>
                        <div class="grid-item annual-fee-item">
                            <div class="grid-label">Annual Fee</div>
                            <div class="grid-value">{allotmentDetails.annualFee}</div>
                        </div>
                    </div>

                    <div class="roommate-section">
                        <h4 class="roommate-title">Roommate Details</h4>
                        <template if:true={hasAllotmentRoommates}>
                            <div class="roommate-list">
                                <template for:each={allotmentRoommates} for:item="roommate">
                                    <div key={roommate.id} class="roommate-item">
                                        <div class="roommate-avatar">
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                                <circle cx="12" cy="7" r="4"></circle>
                                            </svg>
                                        </div>
                                        <div class="roommate-info">
                                            <div class="roommate-name">{roommate.name}</div>
                                            <div class="roommate-id">{roommate.studentId}</div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template if:false={hasAllotmentRoommates}>
                            <div class="empty-state-message">No roommate details available.</div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
        <!-- Developer Controls (For Testing) -->
        <!-- Developer Controls (For Testing) 
        <div style="margin-top: 40px; padding: 20px; border-top: 2px dashed #ccc; text-align: center; opacity: 0.7;">
            <h3 style="margin-bottom: 10px; font-weight: bold;">Developer Controls</h3>
            <button onclick={showInitial} style="padding: 8px 16px; margin: 0 5px; cursor: pointer;">Reset to Initial</button>
            <button onclick={showUnderReview} style="padding: 8px 16px; margin: 0 5px; cursor: pointer;">Simulate Reviewed</button>
            <button onclick={showRejected} style="padding: 8px 16px; margin: 0 5px; cursor: pointer;">Simulate Rejected</button>
            <button onclick={showProvisional} style="padding: 8px 16px; margin: 0 5px; cursor: pointer;">Simulate Allocation</button>
        </div>
        -->
    </div>

    <template if:true={isAmenitiesModalOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={handleCloseAmenities}></div>
            <div class="modal-container-wrapper">
                <div class="modal-container">
                    <header class="modal-header">
                        <h2 class="modal-title">Amenities</h2>
                    </header>
                    <div class="modal-content">
                        <template if:true={hasAmenities}>
                            <div class="amenity-list">
                                <template for:each={amenityItems} for:item="amenity">
                                    <div key={amenity.id} class="amenity-list-item">
                                        <lightning-icon icon-name={amenity.icon} size="x-small" alternative-text={amenity.label}></lightning-icon>
                                        <span>{amenity.label}</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template if:false={hasAmenities}>
                            <div class="empty-state-message">No amenities available.</div>
                        </template>
                    </div>
                    <footer class="modal-footer">
                        <button class="btn-primary" onclick={handleCloseAmenities}>Close</button>
                    </footer>
                </div>
            </div>
        </div>
    </template>

    <!-- Help Modal -->
    <template if:true={isHelpModalOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={handleCloseHelpModal}></div>
            <div class="modal-container-wrapper">
                <div class="modal-container">
                    <header class="modal-header">
                        <h2 class="modal-title">Get Help</h2>
                    </header>
                    <div class="modal-content">
                        <!-- Description -->
                        <div class="form-group">
                            <label class="form-label">Description of the issue (Optional)</label>
                            <div class="textarea-wrapper">
                                <textarea class="form-input textarea-input" placeholder="Enter description" rows="4"></textarea>
                                <button class="btn-auto-create">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 2L15 8L21 9L17 14L18 20L12 17L6 20L7 14L3 9L9 8L12 2Z"/>
                                    </svg>
                                    Auto-Create Form Now
                                </button>
                            </div>
                        </div>

                        <!-- Issue Type -->
                        <div class="form-group">
                            <label class="form-label">Choose Issue Type<span class="required">*</span></label>
                            <div class="select-wrapper">
                                <select class="form-input select-input">
                                    <option>Hostel Setup</option>
                                    <option>Allocation</option>
                                    <option>Other</option>
                                </select>
                            </div>
                        </div>

                        <!-- Issue Subject -->
                        <div class="form-group">
                            <label class="form-label">Issue Subject<span class="required">*</span></label>
                            <input type="text" class="form-input" placeholder="Enter issue subject" />
                        </div>

                        <!-- File Upload -->
                        <div class="form-group">
                            <label class="form-label">Upload Supporting Document (Optional)</label>
                            <input type="file" class="file-input" onchange={handleFileChange} accept=".png,.jpg,.jpeg,.pdf" style="display:none;" />
                            <div class="file-upload-box" onclick={handleUploadClick}>
                                <template if:false={uploadedFileName}>
                                    <span class="upload-text">
                                        <span class="upload-link">Click to upload</span> or drag and drop
                                    </span>
                                    <span class="upload-hint">PNG, JPG or PDF (Max 5 MB)</span>
                                </template>
                                <template if:true={uploadedFileName}>
                                    <span class="upload-text">
                                        Selected File: <span class="upload-link">{uploadedFileName}</span>
                                    </span>
                                    <span class="upload-hint">Click to replace</span>
                                </template>
                            </div>
                        </div>
                    </div>
                    <footer class="modal-footer">
                        <button class="btn-outline" onclick={handleCloseHelpModal}>Cancel</button>
                        <button class="btn-primary" onclick={handleSubmitHelp}>Submit</button>
                    </footer>
                </div>
            </div>
        </div>
    </template>
    
    <c-custom-toast></c-custom-toast>
</template>
