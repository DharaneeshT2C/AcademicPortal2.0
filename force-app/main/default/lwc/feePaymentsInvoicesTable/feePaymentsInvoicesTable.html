<template>
	<section class="table-panel">
	        <div class="table-shell desktop-table">
	            <div class="table-head">
	                <span>Particulars</span>
	                <span>Invoice ID</span>
	                <button class="sort-button" type="button" onclick={handleInvoiceDateSort}>
	                    <span>Invoice Date</span>
	                    <img src={sortIcon} alt="Sort" class="sort-mark" />
	                </button>
	                <span>Total Paid</span>
	                <span>Currency</span>
	                <span>Remaining</span>
	                <span>Pro - Forma Invoice</span>
	                <span>Invoice</span>
	            </div>

            <template for:each={filteredRows} for:item="row">
                <div key={row.id} class="table-row">
                    <span>{row.particulars}</span>
                    <span>{row.invoiceId}</span>
                    <span>{row.invoiceDate}</span>
                    <span>{row.totalPaid}</span>
                    <span>{row.currency}</span>
                    <span>{row.remaining}</span>
                    <button class="icon-button" type="button" data-id={row.id} data-kind="proforma" onclick={handleDownload}>
                        <lightning-icon icon-name="utility:download" size="x-small" alternative-text="Download"></lightning-icon>
                    </button>
                    <template if:true={row.invoiceAvailable}>
                        <button class="icon-button" type="button" data-id={row.id} data-kind="invoice" onclick={handleDownload}>
                            <lightning-icon icon-name="utility:download" size="x-small" alternative-text="Download"></lightning-icon>
                        </button>
                    </template>
                    <template if:false={row.invoiceAvailable}>
                        <span class="status-pill status-pill-warn">Not Available</span>
                    </template>
                </div>
            </template>

            <template if:false={filteredRows.length}>
                <div class="empty-state">No invoices found.</div>
            </template>
        </div>

	        <div class="mobile-list">
	            <template for:each={filteredRows} for:item="row">
	                <article key={row.id} class="mobile-card">
                    <div class="mobile-head">
                        <h3>{row.particulars}</h3>
                        <span class="status-pill status-pill-success">Success</span>
                    </div>
                    <div class="mobile-detail-list">
                        <div class="mobile-detail-row"><span>Invoice ID:</span><strong>{row.invoiceId}</strong></div>
                        <div class="mobile-detail-row"><span>Date:</span><strong>{row.invoiceDate}</strong></div>
                        <div class="mobile-detail-row"><span>Amount Paid:</span><strong>INR {row.totalPaid}</strong></div>
                        <div class="mobile-detail-row"><span>Remaining amount:</span><strong>{row.remaining}</strong></div>
                    </div>
                    <div class="mobile-actions">
                        <button class="cta-button cta-button-outline" type="button" data-id={row.id} data-kind="proforma" onclick={handleDownload}>
                            <lightning-icon icon-name="utility:download" size="x-small" alternative-text="Download"></lightning-icon>
                            Pro Forma invoice
                        </button>
                        <template if:true={row.invoiceAvailable}>
                            <button class="cta-button cta-button-primary" type="button" data-id={row.id} data-kind="invoice" onclick={handleDownload}>
                                <lightning-icon icon-name="utility:download" size="x-small" alternative-text="Download"></lightning-icon>
                                Invoice
                            </button>
                        </template>
                        <template if:false={row.invoiceAvailable}>
                            <button class="cta-button cta-button-primary cta-button-disabled" type="button" disabled>
                                <lightning-icon icon-name="utility:download" size="x-small" alternative-text="Unavailable"></lightning-icon>
                                Invoice
                            </button>
                        </template>
                    </div>
                </article>
            </template>
        </div>
    </section>
</template>
