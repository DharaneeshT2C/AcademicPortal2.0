<template>
    <div class="page">
        <div class="page-header"><button class="back-btn" onclick={handleBack}><c-icon name="arrow_back" size="20"></c-icon></button><div><h2 class="page-title">Exam Enrollment</h2><p class="breadcrumb">Exams &gt; Enrollment</p></div></div>

        <template lwc:if={showConfirmation}>
            <div class="card confirmation-card">
                <div class="confirmation-icon">
                    <c-icon name="check_circle" size="48"></c-icon>
                </div>
                <h3 class="confirmation-title">Enrollment Confirmed!</h3>
                <p class="confirmation-sub">You're all set for the upcoming exam window.</p>
                <div class="confirmation-grid">
                    <div class="confirmation-row"><span>Reference</span><strong>{_confirmation.referenceNumber}</strong></div>
                    <div class="confirmation-row"><span>Courses</span><strong>{confirmationCourseList}</strong></div>
                    <div class="confirmation-row"><span>Amount paid</span><strong>INR {_confirmation.amountPaid}</strong></div>
                    <div class="confirmation-row"><span>Mode</span><strong>{_confirmation.paymentMode}</strong></div>
                    <div class="confirmation-row"><span>Confirmed at</span><strong>{_confirmation.confirmedAt}</strong></div>
                </div>
                <button class="btn-primary full-width" onclick={handleDoneClick}>Back to My Exams</button>
            </div>
        </template>

        <template lwc:else>
            <div class="enrollment-grid">
                <div class="main-col">
                    <div class="card">
                        <h3 class="section-title">Selected Courses</h3>
                        <div class="alert-bar"><c-icon name="timer" size="20"></c-icon> Enrollment window closes in: <strong>{data.windowCloses}</strong></div>
                        <table class="enroll-table">
                            <thead><tr><th>Course Name</th><th>Course Code</th><th>Credits</th><th>Format</th><th>Type</th></tr></thead>
                            <tbody>
                                <template for:each={selectedCourses} for:item="course">
                                    <tr key={course.code}><td>{course.name}</td><td>{course.code}</td><td>{course.credits}</td><td>{course.format}</td><td>{course.type}</td></tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="right-col">
                    <div class="card">
                        <h3 class="section-title">Fee Summary</h3>
                        <div class="fee-summary">
                            <div class="fee-row"><span>Total Exam Fee</span><strong>INR {totalFee}</strong></div>
                            <template lwc:if={hasError}>
                                <div class="error-banner">{_errorMessage}</div>
                            </template>
                            <button class="btn-primary full-width" onclick={handlePayAndConfirm} disabled={isPayDisabled}>{payButtonLabel}</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
