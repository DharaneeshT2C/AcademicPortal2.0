<template>
    <div class="login-container">
        <div class="login-left">
            <div class="login-left-overlay">
                <p class="institute-name-left">Name of the Institute</p>
                <div class="login-left-content">
                    <h1 class="login-tagline">Your Learning, Simplified</h1>
                    <div class="tagline-underline"></div>
                    <p class="login-subtitle">Learn &bull; Track &bull; Grow</p>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form-container">
                <h2 class="institute-name">Name of the Institute</h2>
                <h3 class="login-title">Student Login</h3>
                <p class="login-description">Stay on track with your learning</p>

                <form onsubmit={handleLogin}>
                    <div class="form-group">
                        <label class="form-label" for="studentId">Student ID</label>
                        <input
                            type="text"
                            id="studentId"
                            class="form-input"
                            placeholder="Enter your student ID"
                            value={studentId}
                            onchange={handleStudentIdChange}
                        />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="password-wrapper">
                            <input
                                type={passwordType}
                                id="password"
                                class="form-input"
                                placeholder="Enter password"
                                value={password}
                                onchange={handlePasswordChange}
                            />
                            <button type="button" class="password-toggle" onclick={togglePassword}>
                                <template lwc:if={showPassword}>
                                    <c-icon name="visibility_off" size="20"></c-icon>
                                </template>
                                <template lwc:else>
                                    <c-icon name="visibility" size="20"></c-icon>
                                </template>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" checked={rememberMe} onchange={handleRememberMe} />
                            <span>Remember Me</span>
                        </label>
                        <span class="forgot-password">Forgot Password? <a href="#">Reset</a></span>
                    </div>

                    <template lwc:if={hasError}>
                        <p class="login-error" style="color:#D92D20;font-size:14px;margin:8px 0;text-align:center;">{errorMessage}</p>
                    </template>

                    <button type="submit" class="login-button" disabled={submitting}>
                        <template lwc:if={submitting}>Signing in…</template>
                        <template lwc:else>Login</template>
                    </button>

                    <p class="need-help">Need Help? <a href="#">Contact Admin.</a></p>
                </form>

                <div class="powered-by">
                    Powered by <span class="powered-logo">KEN</span>
                </div>
            </div>
        </div>
    </div>
</template>
