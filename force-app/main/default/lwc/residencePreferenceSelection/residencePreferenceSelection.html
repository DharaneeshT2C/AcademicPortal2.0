<template>
    <template if:false={isThemeLoaded}>
        <div class="skeleton-wrap">
            <div class="skeleton-header-block"></div>
            <div class="skeleton-grid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>
    </template>
    <div class={selectionPageClass}>
        <header class="page-header">
            <h1 class="page-title">Select Upto 3 Preferences</h1>
            <p class="page-subtitle">Choose and rank your top 3 residences. Add floor and roommate preferences for each.</p>
            <div class="selection-counter">
                Selected: {selectedCount} / 3
            </div>
        </header>

        <div class="residence-grid">
            <!-- Hidden SVG Definitions for Clip Paths, reused from residenceAllocation -->
            <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                <defs>
                   <clipPath id="clip0_twin">
                        <rect width="24" height="24" fill="white"/>
                    </clipPath>
                    <clipPath id="clip_triple">
                        <rect width="24" height="24" fill="white"/>
                    </clipPath>
                    <clipPath id="clip_ac">
                        <rect width="24" height="24" fill="white"/>
                    </clipPath>
                    <clipPath id="clip_bath">
                        <rect width="24" height="24" fill="white"/>
                    </clipPath>
                    <clipPath id="mask0_15645_169413">
                       <rect width="34" height="34" fill="#D9D9D9"/>
                    </clipPath>
                </defs>
            </svg>

            <template for:each={residences} for:item="res">
                <div key={res.id} class="residence-card">
                    <template if:false={res.isSelected}>
                        <!-- Unselected State -->
                        <div class="card-image-wrapper">
                            <!-- Placeholder gradient instead of image -->
                              <div class="card-image-placeholder" style={res.bgStyle}></div>
                            <!-- <img src={res.imageUrl} class="card-image" alt={res.name} /> -->
                        </div>
                        <div class="card-content">
                            <h3 class="res-name">{res.name}</h3>
                            <div class="res-tags">
                                <template if:true={res.hasAmenityPreview}>
                                    <template for:each={res.amenityPreview} for:item="amenity">
                                        <span key={amenity} class="tag">
                                            <lightning-icon icon-name="utility:check" size="xx-small" class="tag-icon"></lightning-icon>
                                            {amenity}
                                        </span>
                                    </template>
                                    <template if:true={res.hasAmenityOverflow}>
                                        <button
                                            type="button"
                                            class="tag amenity-more amenity-more-button"
                                            onclick={handleOpenAmenitiesModal}
                                            data-id={res.id}
                                            title="View all amenities"
                                            aria-label="View all amenities"

                            <!-- Success Banner -->
                            <div class="success-banner">
                                <lightning-icon icon-name="utility:check" size="xx-small" class="success-icon-custom"></lightning-icon>
                                <span class="success-content">
                                    <strong class="pref-label">Preference {res.preferenceOrder}</strong>
                                    <div class={res.prefDetailRowClass}>
                                        <span class="pref-detail-item">• Floor: {res.selectedFloor}</span>
                                        <span class="pref-detail-item">• Roommates: {res.roommateCount} added</span>
                                    </div>
                                </span>
                            </div>

                            <div class="card-footer">
                                <div class="fee-section">
                                    <span class="fee-label">Annual Fee</span>
                                    <span class="fee-amount">{res.feeDisplay}</span>
                                </div>
                                <div class="selected-actions">
                                    <button type="button" class="btn-outline" onclick={handleEditPreference} data-id={res.id}>
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="btn-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>

                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                                    </button>
                                </div>
                            </div>
                        </div>

                </div>
            </template>

            <template if:false={hasResidences}>
                <div class="empty-state">{emptyStateMessage}</div>
            </template>
        </div>
        

        <!-- Fixed Footer Actions -->
        <footer class="page-footer-actions">
            <button type="button" class="btn-outline-large" onclick={handleSaveDraft} disabled={isSaveDraftDisabled}>Save as Draft</button>
            <div class="footer-right-actions">
                <button type="button" class="btn-light" onclick={handleCancel}>Cancel</button>
                <button type="button" class="btn-primary-large" onclick={handleOpenFinalModal} disabled={isSubmitDisabled}>
                    <span class="text-desktop">Submit Preference</span>
                    <span class="text-mobile">Submit</span>
                </button>
            </div>
        </footer>

    <!-- Amenities Modal -->
    <template if:true={isAmenitiesModalOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={closeAmenitiesModal}></div>
            <div class="modal-container-wrapper">
                <div class="modal-container styled-modal amenities-modal" role="dialog" aria-modal="true">
                    <div class="modal-content-left">
                        <h2 class="modal-title-left">Amenities - {amenitiesModalTitle}</h2>
                        <div class="amenities-list" role="list">
                            <template for:each={amenitiesModalItems} for:item="amenity">
                                <span key={amenity} class="tag" role="listitem">
                                    <lightning-icon
                                        icon-name="utility:check"
                                        size="xx-small"
                                        class="tag-icon"
                                    ></lightning-icon>
                                    {amenity}
                                </span>
                            </template>
                        </div>
                    </div>
                    <div class="modal-footer-center">
                        <button type="button" class="btn-outline-blue" onclick={closeAmenitiesModal}>Close</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Modal 1: Set Preferences -->
    <template if:true={isPreferenceModalOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={handleClosePreferenceModal}></div>
            <div class="modal-container-wrapper large-modal preference-modal-wrapper">
                <div class="modal-container preference-modal-container">
                    <div class="modal-content two-col-layout preference-modal-content">
                        <!-- Left: Info -->
                        <div class="res-info-col preference-info-col">
                            <div class="modal-image-container">
                                <div class="modal-image-placeholder" style={currentBgStyle}></div>
                                <div class="carousel-dots">
                                    <span class={dot1Class} onclick={handleDotClick} data-index="0"></span>
                                    <span class={dot2Class} onclick={handleDotClick} data-index="1"></span>
                                    <span class={dot3Class} onclick={handleDotClick} data-index="2"></span>
                                </div>
                                <div class="carousel-arrow" onclick={handleCarouselNext}>
                                    <lightning-icon icon-name="utility:chevronright" size="x-small" class="carousel-next-icon"></lightning-icon>
                                </div>
                            </div>
                            
                            <h3 class="res-name-large">{selectedRes.name}</h3>

                            <div class="info-grid">
                                <div class="info-row">
                                    <span class="info-label">Sharing:</span>
                                    <span class="info-val">{displaySharing}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">AC:</span>
                                    <span class="info-val">{displayAC}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Bathroom:</span>
                                    <span class="info-val">{displayBath}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Annual Fee:</span>
                                    <span class="info-val">{displayFee}</span>
                                </div>
                            </div>
                            
                            <div class="divider"></div>
                            
                            <p class="res-desc">
                                Review residence details and set your preference priority.
                            </p>
                        </div>

                        <!-- Right: Form -->
                        <div class="res-form-col preference-form-col">
                            <h2 class="form-title">Set Preferences for {selectedRes.name}</h2>
                            <div class="divider-form-header"></div>
                            
                            <div class="form-content-scroll preference-form-scroll">
                                <div class="form-group">
                                    <label class="form-label">Preference Priority<span class="required">*</span></label>
                                    <div class="priority-toggle">
                                        <button type="button" class={pref1Class} onclick={selectPriority} data-val="1">
                                            <template if:true={isPref1Selected}>
                                                <div class="check-circle"><lightning-icon icon-name="utility:check" size="xx-small" class="check-icon-svg"></lightning-icon></div>
                                            </template>
                                            Preference 1
                                        </button>
                                        <button type="button" class={pref2Class} onclick={selectPriority} data-val="2">
                                            <template if:true={isPref2Selected}>
                                                <div class="check-circle"><lightning-icon icon-name="utility:check" size="xx-small" class="check-icon-svg"></lightning-icon></div>
                                            </template>
                                            Preference 2
                                        </button>
                                        <button type="button" class={pref3Class} onclick={selectPriority} data-val="3">
                                            <template if:true={isPref3Selected}>
                                                <div class="check-circle"><lightning-icon icon-name="utility:check" size="xx-small" class="check-icon-svg"></lightning-icon></div>
                                            </template>
                                            Preference 3
                                        </button>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Floor Preference<span class="required">*</span></label>
                                    <div class="select-wrapper">
                                        <select class={floorInputClass} onchange={handleFloorChange} value={displayFloor}>
                                            <option value="">Select floor</option>
                                            <template for:each={availableFloorOptions} for:item="option">
                                                <option key={option.value} value={option.value}>{option.label}</option>
                                            </template>
                                        </select>
                                    </div>
                                    <template if:true={floorError}>
                                        <span class="inline-field-error">{floorError}</span>
                                    </template>
                                </div>

                                <template if:true={showRoommatePreferenceSection}>
                                    <div class="form-group roommate-section">
                                        <template for:each={roommateInputs} for:item="input">
                                            <div key={input.id} class="roommate-input-row">
                                                <label class="sub-label">Roommate Email {input.index}</label>
                                                <input type="email" class={input.inputClass} placeholder="name@email.com" value={input.value} onchange={handleRoommateChange} data-index={input.index} />
                                                <template if:true={input.error}>
                                                    <span class="inline-field-error">{input.error}</span>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                            
                            <div class="form-actions preference-form-actions">
                                <button type="button" class="btn-outline-large preference-btn-cancel" onclick={handleClosePreferenceModal}>Cancel</button>
                                <button type="button" class="btn-primary-large preference-btn-next" onclick={handleSavePreference}>Next</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Confirm Submit Modal -->
    <template if:true={isSubmitConfirmOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={closeSubmitConfirm}></div>
            <div class="modal-container-wrapper">
                <div class="modal-container styled-modal">
                    <div class="modal-content-center">
                         <h2 class="modal-title-center">Are you sure you want to submit your preference?</h2>
                    </div>
                    <div class="modal-footer-center">
                        <button type="button" class="btn-outline-blue" onclick={closeSubmitConfirm}>Cancel</button>
                        <button type="button" class="btn-primary-blue" onclick={proceedToSubmit}>Yes</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Delete Confirm Modal -->
    <template if:true={isDeleteConfirmOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={closeDeleteConfirm}></div>
             <div class="modal-container-wrapper">
                <div class="modal-container styled-modal">
                    <div class="modal-content-left">
                        <h2 class="modal-title-left">Are you sure you want to remove this preference?</h2>
                        <p class="modal-subtitle-left">This will remove it from your selected preferences list.</p>
                    </div>
                    <div class="modal-footer-center">
                         <button type="button" class="btn-outline-blue" onclick={closeDeleteConfirm}>No</button>
                        <button type="button" class="btn-outline-red-filled" onclick={confirmDelete}>Yes</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Low Preference Warning Modal -->
    <template if:true={isLowPrefWarningOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={closeLowPrefWarning}></div>
             <div class="modal-container-wrapper">
                <div class="modal-container styled-modal">
                     <div class="modal-content-center">
                        <div class="warning-icon-wrapper">
                           <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" fill="#FEF3C7" opacity="1"/>
                                <path d="M12 8V12" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="16" r="1.5" fill="#D97706"/>
                            </svg>
                        </div>
                        <h2 class="modal-title-center">You have selected only {selectedCount} preference</h2>
                        <p class="modal-subtitle-center">Are you sure you want to continue?</p>
                    </div>
                    <div class="modal-footer-center">
                        <button type="button" class="btn-outline-blue" onclick={closeLowPrefWarning}>Cancel</button>
                        <button type="button" class="btn-primary-blue" onclick={proceedToSubmit}>Yes</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Success Modal -->
    <template if:true={isSuccessModalOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={closeSuccessModal}></div>
            <div class="modal-container-wrapper">
                <div
                    class="modal-container styled-modal"
                    style={successModalStyle}
                    onanimationend={handleSuccessModalAnimationEnd}
                >
                    <div class="modal-content-center">
                        <div class="success-icon-wrapper">
                            <svg width="60" height="60" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect width="36" height="36" rx="18" fill="#C1DCC3"/>
                                <mask id="mask0_434_134" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="4" y="4" width="28" height="28">
                                <rect x="4.5" y="4.5" width="27" height="27" fill="#D9D9D9"/>
                                </mask>
                                <g mask="url(#mask0_434_134)">
                                <path d="M16.425 23.175L24.3562 15.2438L22.7812 13.6687L16.425 20.025L13.2188 16.8187L11.6437 18.3938L16.425 23.175ZM18 29.25C16.4438 29.25 14.9813 28.9545 13.6125 28.3635C12.2438 27.7733 11.0531 26.9719 10.0406 25.9594C9.02813 24.9469 8.22675 23.7563 7.6365 22.3875C7.0455 21.0187 6.75 19.5562 6.75 18C6.75 16.4438 7.0455 14.9813 7.6365 13.6125C8.22675 12.2438 9.02813 11.0531 10.0406 10.0406C11.0531 9.02813 12.2438 8.22637 13.6125 7.63537C14.9813 7.04512 16.4438 6.75 18 6.75C19.5562 6.75 21.0187 7.04512 22.3875 7.63537C23.7563 8.22637 24.9469 9.02813 25.9594 10.0406C26.9719 11.0531 27.7733 12.2438 28.3635 13.6125C28.9545 14.9813 29.25 16.4438 29.25 18C29.25 19.5562 28.9545 21.0187 28.3635 22.3875C27.7733 23.7563 26.9719 24.9469 25.9594 25.9594C24.9469 26.9719 23.7563 27.7733 22.3875 28.3635C21.0187 28.9545 19.5562 29.25 18 29.25Z" fill="#388E3C"/>
                                </g>
                            </svg>
                        </div>
                        <h2 class="modal-title-center">{successModalTitle}</h2>
                        <template if:true={successModalMessage}>
                            <p class="modal-subtitle-center">{successModalMessage}</p>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>
    
    <template if:true={isFinalModalOpen}>
        <div class="modal-overlay">
            <div class="modal-backdrop" onclick={handleCloseFinalModal}></div>
            <div class="modal-container-wrapper">
                <div class="modal-container">
                    <header class="modal-header">
                        <h2 class="modal-title">Hostel Allotment Form</h2>
                        <div class="warning-banner">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" fill="#D64545"/>
                                <path d="M11 7h2v2h-2V7zm0 4h2v6h-2v-6z" fill="white"/>
                            </svg>
                            <span>These Details cannot be edited after submission.</span>
                        </div>
                    </header>
                    <div class="modal-content modal-content-padded">
                        <!-- Allergies -->
                        <div class="form-group">
                            <label class="form-label">Any Allergies<span class="required">*</span></label>
                            <div class="radio-group">
                                <div class={allergyYesClass} onclick={handleAllergyChange} data-value="Yes">
                                    <div class="radio-circle">
                                        <lightning-icon icon-name="utility:check" size="xx-small" class="radio-check-icon" if:true={isAllergyYes}></lightning-icon>
                                    </div>
                                    <span>Yes</span>
                                </div>
                                <div class={allergyNoClass} onclick={handleAllergyChange} data-value="No">
                                    <div class="radio-circle">
                                         <lightning-icon icon-name="utility:check" size="xx-small" class="radio-check-icon" if:true={isAllergyNo}></lightning-icon>
                                    </div>
                                    <span>No</span>
                                </div>
                            </div>
                        </div>

                        <!-- Disabilities -->
                        <div class="form-group">
                            <label class="form-label">Any Disabilities<span class="required">*</span></label>
                            <div class="radio-group">
                                <div class={disabilityYesClass} onclick={handleDisabilityChange} data-value="Yes">
                                    <div class="radio-circle">
                                        <lightning-icon icon-name="utility:check" size="xx-small" class="radio-check-icon" if:true={isDisabilityYes}></lightning-icon>
                                    </div>
                                    <span>Yes</span>
                                </div>
                                <div class={disabilityNoClass} onclick={handleDisabilityChange} data-value="No">
                                    <div class="radio-circle">
                                        <lightning-icon icon-name="utility:check" size="xx-small" class="radio-check-icon" if:true={isDisabilityNo}></lightning-icon>
                                    </div>
                                    <span>No</span>
                                </div>
                            </div>
                        </div>

                        <!-- ID Proof -->
                        <div class="form-group">
                            <label class="form-label">ID Proof<span class="required">*</span></label>
                            <input type="file" class="hidden-file-input" data-file-type="idProof" onchange={handleFileUpload} accept=".png,.jpg,.jpeg,.pdf" style="display:none;" />
                            <div class="file-upload-box" onclick={triggerFileUpload} data-type="idProof">
                                <template if:false={idProofFile}>
                                    <span class="upload-link">Click to upload</span> or drag and drop
                                    <span class="upload-hint">PNG, JPG or PDF (Max 5 MB)</span>
                                </template>
                                <template if:true={idProofFile}>
                                    <span class="upload-link">{idProofFile}</span>
                                    <span class="upload-hint">Click to replace</span>
                                </template>
                            </div>
                        </div>

                        <!-- Medical -->
                        <div class="form-group">
                            <label class="form-label">Medical Records (Optional)</label>
                            <input type="file" class="hidden-file-input" data-file-type="medical" onchange={handleFileUpload} accept=".png,.jpg,.jpeg,.pdf" style="display:none;" />
                            <div class="file-upload-box" onclick={triggerFileUpload} data-type="medical">
                                <template if:false={medicalFile}>
                                    <span class="upload-link">Click to upload</span> or drag and drop
                                    <span class="upload-hint">PNG, JPG or PDF (Max 5 MB)</span>
                                </template>
                                <template if:true={medicalFile}>
                                    <span class="upload-link">{medicalFile}</span>
                                    <span class="upload-hint">Click to replace</span>
                                </template>
                            </div>
                        </div>
                        
                        <!-- Emergency Notes -->
                        <div class="form-group">
                            <label class="form-label">Emergency Notes (Optional)</label>
                            <textarea class="form-input" rows="3" placeholder="Is there anything else you'd like the administration to know" value={emergencyNotes} onchange={handleNotesChange}></textarea>
                        </div>
                    </div>
                    <footer class="modal-footer">
                        <button type="button" class="btn-outline" onclick={handleCloseFinalModal}>Back</button>
                        <button type="button" class="btn-primary" onclick={handleSubmitFinal}>Submit Form</button>
                    </footer>
                </div>
            </div>
        </div>
    </template>

    <c-custom-toast ontoastclosed={handleToastClosed}></c-custom-toast>
</template>
